<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jan Völker | UX Design</title>
    <meta name="description" content="Jan Völker - UX Designer @ GOT BAG. Designing digital experiences that ripple through the physical world." />
    <meta property="og:title" content="Jan Völker | UX Design" />
    <meta property="og:description" content="UX Designer @ GOT BAG. Designing digital experiences that ripple through the physical world." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --abyss: #00121f;
        --ocean: #002b49;
        --cyan: #00d1ff;
        --white: #ffffff;
        --ripple-x: 50%;
        --ripple-y: 50%;
        --ripple-s: 0;
      }

      body {
        margin: 0;
        background: var(--abyss);
        color: white;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: none;
      }

      /* Hide custom cursor on mobile/touch */
      @media (hover: none) and (pointer: coarse) {
        body {
          cursor: auto;
        }
        #cursor {
          display: none;
        }
      }

      #cursor {
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 1000;
        mix-blend-mode: difference;
        transform: translate(-50%, -50%);
        transition:
          width 0.3s ease,
          height 0.3s ease,
          background 0.3s ease;
      }

      #cursor.active {
        width: 60px;
        height: 60px;
        background: var(--cyan);
      }

      .liquid-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(circle at 50% 50%, var(--ocean) 0%, var(--abyss) 100%);
        opacity: 0.8;
      }

      #app {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: url(#ripple);
        padding: 20px;
        box-sizing: border-box;
      }

      /* Disable SVG filter on mobile/touch devices for better performance */
      @media (hover: none) and (pointer: coarse) {
        #app {
          filter: none;
        }
      }

      .card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        padding: clamp(2rem, 8vw, 5rem);
        border-radius: clamp(2rem, 5vw, 4rem);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
        max-width: 800px;
        width: 100%;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        transition:
          transform 0.3s ease,
          opacity 1s ease;
        opacity: 0;
        transform: translateY(30px);
        will-change: transform, opacity;
      }

      .card.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .card:hover {
        transform: translateY(-5px);
      }

      h1 {
        font-size: clamp(2.5rem, 12vw, 5.5rem);
        margin: 0;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -0.05em;
      }

      p {
        opacity: 0.4;
        font-size: clamp(1rem, 4vw, 1.4rem);
        margin-top: 1.5rem;
        font-weight: 300;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }

      .social-links {
        margin-top: 3rem;
        display: flex;
        gap: 1rem;
        justify-content: center;
        padding: 0;
        list-style: none;
      }

      .social-link {
        color: white;
        text-decoration: none;
        opacity: 0.3;
        transition:
          opacity 0.3s ease,
          transform 0.3s ease,
          color 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
      }

      .social-link svg {
        width: 24px;
        height: 24px;
      }

      .social-link:hover {
        opacity: 1;
        transform: scale(1.2);
        color: var(--cyan);
      }

      .company-link {
        color: inherit;
        text-decoration: none;
      }

      .impact-tap {
        display: none;
      }

      @media (hover: none) and (pointer: coarse) {
        .impact-click {
          display: none;
        }
        .impact-tap {
          display: inline;
        }
      }

      .wave-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background: radial-gradient(circle at var(--x) var(--y), transparent var(--s), rgba(0, 209, 255, 0.05) calc(var(--s) + 100px), transparent calc(var(--s) + 300px));
        opacity: var(--o);
        z-index: 1;
      }

      /* More visible wave overlay on mobile/touch devices */
      @media (hover: none) and (pointer: coarse) {
        .wave-overlay {
          background: radial-gradient(circle at var(--x) var(--y), transparent var(--s), rgba(0, 209, 255, 0.25) calc(var(--s) + 100px), transparent calc(var(--s) + 300px));
        }
      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div class="liquid-bg"></div>

    <div id="app">
      <div class="card" id="card">
        <span style="color: var(--cyan); font-weight: 800; letter-spacing: 0.3em; font-size: clamp(0.6rem, 2vw, 0.8rem); text-transform: uppercase; display: block; margin-bottom: 1.4rem"
          >UX Designer @ <a href="https://got-bag.com/" target="_blank" class="company-link">GOT BAG</a></span
        >
        <h1>JAN VÖLKER</h1>
        <p>Designing digital experiences that ripple through the physical world.</p>

        <div class="social-links">
          <a href="#" class="social-link email-link" aria-label="Email" data-n="hallo" data-d="janvoelker.de">
            <i data-lucide="mail"></i>
          </a>
          <a href="https://www.linkedin.com/in/jan-voelker/" target="_blank" class="social-link" aria-label="LinkedIn">
            <i data-lucide="globe"></i>
          </a>
        </div>

        <div style="margin-top: 3rem; font-weight: 800; opacity: 0.2; letter-spacing: 0.1em; font-size: 0.7rem">
          <span class="impact-click">CLICK TO CREATE AN IMPACT</span>
          <span class="impact-tap">TAP TO CREATE AN IMPACT</span>
        </div>
      </div>
    </div>

    <svg style="display: none">
      <defs>
        <filter id="ripple">
          <feTurbulence id="turb" type="fractalNoise" baseFrequency="0" numOctaves="2" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" id="disp" />
        </filter>
      </defs>
    </svg>

    <script>
      const cursor = document.getElementById('cursor');
      const turb = document.getElementById('turb');
      const disp = document.getElementById('disp');
      const card = document.getElementById('card');
      const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

      // Initialize icons
      lucide.createIcons();

      // Card entrance animation
      setTimeout(() => {
        card.classList.add('visible');
      }, 300);

      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        cursor.style.opacity = '1';
      });

      document.addEventListener('mouseleave', () => {
        cursor.style.opacity = '0';
      });

      document.addEventListener('mouseenter', () => {
        cursor.style.opacity = '1';
      });

      // Cursor hover effect
      const updateInteractive = () => {
        const interactiveElements = document.querySelectorAll('a, button');
        interactiveElements.forEach((el) => {
          el.addEventListener('mouseenter', () => cursor.classList.add('active'));
          el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
      };
      updateInteractive();

      // Email obfuscation
      document.querySelectorAll('.email-link').forEach((el) => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          const n = e.currentTarget.getAttribute('data-n');
          const d = e.currentTarget.getAttribute('data-d');
          if (n && d) {
            window.location.href = `mailto:${n}@${d}`;
          }
        });
      });

      const ripples = [];
      const triggerWave = (clientX, clientY) => {
        const ripple = {
          x: clientX,
          y: clientY,
          start: performance.now(),
          duration: 3500,
          el: document.createElement('div'),
        };
        ripple.el.className = 'wave-overlay';
        ripple.el.style.setProperty('--x', clientX + 'px');
        ripple.el.style.setProperty('--y', clientY + 'px');
        document.body.appendChild(ripple.el);
        ripples.push(ripple);

        if (ripples.length === 1) {
          requestAnimationFrame(animateRipples);
        }
      };

      const animateRipples = (time) => {
        if (ripples.length === 0) {
          if (!isTouchDevice) {
            turb.setAttribute('baseFrequency', '0');
            disp.setAttribute('scale', '0');
          }
          return;
        }

        let totalScale = 0;
        let totalFreq = 0;

        for (let i = ripples.length - 1; i >= 0; i--) {
          const r = ripples[i];
          const elapsed = time - r.start;
          const p = elapsed / r.duration;

          if (p < 1) {
            const easeOut = 1 - Math.pow(1 - p, 3);
            const fade = 1 - Math.pow(p, 2);
            const freq = 0.005 + Math.sin(p * Math.PI) * 0.002;
            const scale = Math.sin(p * Math.PI) * 120 * fade;

            // Adjust radius and opacity for touch devices
            const maxRadius = isTouchDevice ? Math.min(2500, Math.max(window.innerWidth, window.innerHeight) * 0.8) : 2500;
            const opacityMultiplier = isTouchDevice ? 1.2 : 0.8;
            r.el.style.setProperty('--s', easeOut * maxRadius + 'px');
            r.el.style.setProperty('--o', fade * opacityMultiplier);

            totalScale += scale;
            totalFreq = Math.max(totalFreq, freq);
          } else {
            r.el.remove();
            ripples.splice(i, 1);
          }
        }

        if (!isTouchDevice) {
          turb.setAttribute('baseFrequency', totalFreq);
          disp.setAttribute('scale', Math.min(totalScale, 200));
        }

        requestAnimationFrame(animateRipples);
      };

      document.addEventListener('mousedown', (e) => {
        if (!e.target.closest('a')) {
          triggerWave(e.clientX, e.clientY);
        }
      });
      document.addEventListener('touchstart', (e) => {
        if (!e.target.closest('a')) {
          const touch = e.touches[0];
          triggerWave(touch.clientX, touch.clientY);
        }
      });
    </script>
  </body>
</html>
