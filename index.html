    <style>
      :root {
        --abyss: #00121f;
        --ocean: #002b49;
        --cyan: #00d1ff;
        --white: #ffffff;
      }

      body {
        margin: 0;
        background: var(--abyss);
        color: white;
        font-family: 'Sora', sans-serif;
        overflow: hidden;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: none;
      }

      /* Hide custom cursor on mobile/touch */
      @media (hover: none) and (pointer: coarse) {
        body {
          cursor: auto;
        }
        #cursor {
          display: none;
        }
      }

      #cursor {
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 1000;
        mix-blend-mode: difference;
        transform: translate(-50%, -50%);
        transition:
          width 0.3s ease,
          height 0.3s ease,
          background 0.3s ease;
      }

      #cursor.active {
        width: 60px;
        height: 60px;
        background: var(--cyan);
      }

      .liquid-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(circle at 50% 50%, var(--ocean) 0%, var(--abyss) 100%);
        opacity: 0.8;
      }

      #app {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: url(#ripple);
        padding: clamp(2rem, 5vw, 4rem);
        box-sizing: border-box;
        perspective: 1000px;
      }

      /* Disable SVG filter on mobile/touch devices for better performance */
      @media (hover: none) and (pointer: coarse) {
        #app {
          filter: none;
        }
      }

      .card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        padding: clamp(2rem, 8vw, 5rem);
        border-radius: clamp(2rem, 5vw, 4rem);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
        max-width: 800px;
        width: 100%;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        transition: opacity 1s ease;
        opacity: 0;
        transform: translateY(30px);
        will-change: transform, opacity;
        transform-style: preserve-3d;
        position: relative;
      }

      .card.visible {
        opacity: 1;
        transform: translateY(0);
      }

      h1 {
        font-size: clamp(2.5rem, 12vw, 5.5rem);
        margin: 0;
        font-weight: 800;
        line-height: 1.15;
        letter-spacing: -0.05em;
      }

      p {
        opacity: 0.4;
        font-size: clamp(1rem, 4vw, 1.4rem);
        margin-top: 1.5rem;
        font-weight: 300;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }

      .social-links {
        margin-top: 3rem;
        display: flex;
        gap: clamp(1rem, 3vw, 2rem);
        justify-content: center;
        padding: 0;
        list-style: none;
      }

      .social-link {
        color: white;
        text-decoration: none;
        opacity: 0.3;
        transition:
          opacity 0.3s ease,
          transform 0.3s ease,
          color 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        width: clamp(44px, 8vw, 60px);
        height: clamp(44px, 8vw, 60px);
      }

      .social-link svg {
        width: clamp(24px, 5vw, 36px);
        height: clamp(24px, 5vw, 36px);
      }

      .social-link:hover {
        opacity: 1;
        transform: scale(1.2);
        color: var(--cyan);
      }

      .company-link {
        color: inherit;
        text-decoration: none;
      }

      .impact-tap {
        display: none;
      }

      @media (hover: none) and (pointer: coarse) {
        .impact-click {
          display: none;
        }
        .impact-tap {
          display: inline;
        }
        /* Disable hover effects on touch devices */
        .social-link:hover {
          opacity: 0.3;
          transform: none;
          color: white;
        }
        .company-link:hover {
          color: inherit;
        }
      }

      .wave-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), transparent var(--s, 0px), rgba(0, 209, 255, 0.3) calc(var(--s, 0px) + 100px), transparent calc(var(--s, 0px) + 500px));
        opacity: var(--o, 0);
        z-index: 9999;
        mix-blend-mode: screen;
        transition: opacity 0.5s ease-out;
      }

      /* More visible wave overlay on mobile/touch devices */
      @media (hover: none) and (pointer: coarse) {
        .wave-overlay {
          background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), transparent var(--s, 0px), rgba(0, 209, 255, 0.4) calc(var(--s, 0px) + 150px), transparent calc(var(--s, 0px) + 600px));
        }
      }

      /* Underwater plant sway animation */
      @keyframes sway {
        0%,
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
        25% {
          transform: translate(1.5px, -0.9px) rotate(0.4deg);
        }
        50% {
          transform: translate(-0.9px, 1.5px) rotate(-0.2deg);
        }
        75% {
          transform: translate(0.6px, 1.2px) rotate(0.28deg);
        }
      }
    </style>

  <body>

        <div class="social-links">

            <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" fill="currentColor" viewBox="0 0 256 256">

                d="M216,24H40A16,16,0,0,0,24,40V216a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V40A16,16,0,0,0,216,24Zm0,192H40V40H216V216ZM96,112v64a8,8,0,0,1-16,0V112a8,8,0,0,1,16,0Zm88,28v36a8,8,0,0,1-16,0V140a20,20,0,0,0-40,0v36a8,8,0,0,1-16,0V112a8,8,0,0,1,15.79-1.78A36,36,0,0,1,184,140ZM100,84A12,12,0,1,1,88,72,12,12,0,0,1,100,84Z"

        <div style="margin-top: 3rem; font-weight: 800; opacity: 0.2; letter-spacing: 0.1em; font-size: clamp(0.6rem, 2vw, 0.8rem)">

    <svg width="0" height="0" viewBox="0 0 100 100" style="position: absolute; left: -9999px">
      <defs>
        <filter id="ripple" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
          <feTurbulence id="turb" type="turbulence" baseFrequency="0" numOctaves="3" seed="1" result="noise" />
          <feDisplacementMap id="disp" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <script>
      const cursor = document.getElementById('cursor');
      const card = document.getElementById('card');
      const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

      // Feature detection for SVG filters
      const supportsSvgFilters = (() => {
        try {
          // Create a temporary SVG with a filter
          const svgNS = 'http://www.w3.org/2000/svg';
          const svg = document.createElementNS(svgNS, 'svg');
          svg.setAttribute('width', '0');
          svg.setAttribute('height', '0');
          svg.style.position = 'absolute';
          svg.style.left = '-9999px';

          const defs = document.createElementNS(svgNS, 'defs');
          const filter = document.createElementNS(svgNS, 'filter');
          filter.setAttribute('id', 'svg-filter-test');

          const feGaussianBlur = document.createElementNS(svgNS, 'feGaussianBlur');
          feGaussianBlur.setAttribute('stdDeviation', '2');
          filter.appendChild(feGaussianBlur);
          defs.appendChild(filter);
          svg.appendChild(defs);

          // Create a test div that uses the filter
          const testDiv = document.createElement('div');
          testDiv.style.width = '10px';
          testDiv.style.height = '10px';
          testDiv.style.backgroundColor = 'red';
          testDiv.style.filter = 'url(#svg-filter-test)';

          document.body.appendChild(svg);
          document.body.appendChild(testDiv);

          // Check if filter property is recognized
          const hasFilter = testDiv.style.filter.includes('url');

          // Clean up
          document.body.removeChild(svg);
          document.body.removeChild(testDiv);

          return hasFilter;
        } catch (e) {
          return false;
        }
      })();

      const turb = supportsSvgFilters ? document.getElementById('turb') : null;
      const disp = supportsSvgFilters ? document.getElementById('disp') : null;

      // If SVG filters are not supported, remove the filter from #app
      if (!supportsSvgFilters) {
        const app = document.getElementById('app');
        if (app) {
          app.style.filter = 'none';
        }
      }

      // Card entrance animation
      setTimeout(() => {
        card.classList.add('visible');
      }, 300);

      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        cursor.style.opacity = '1';
      });

      document.addEventListener('mouseleave', () => {
        cursor.style.opacity = '0';
      });

      document.addEventListener('mouseenter', () => {
        cursor.style.opacity = '1';
      });

      // Cursor hover effect
      const updateInteractive = () => {
        const interactiveElements = document.querySelectorAll('a, button');
        interactiveElements.forEach((el) => {
          el.addEventListener('mouseenter', () => cursor.classList.add('active'));
          el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
      };
      updateInteractive();

      // Enhanced email obfuscation with Caesar cipher
      document.querySelectorAll('.email-link').forEach((el) => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          const enc1 = e.currentTarget.getAttribute('data-enc1');
          const enc2 = e.currentTarget.getAttribute('data-enc2');
          const a = parseInt(e.currentTarget.getAttribute('data-a'));
          const b = parseInt(e.currentTarget.getAttribute('data-b'));
          if (!enc1 || !enc2 || isNaN(a) || isNaN(b)) return;
          const shift = a - b; // decode shift
          const decode = (encoded) => {
            return encoded
              .split('')
              .map((c) => String.fromCharCode(c.charCodeAt(0) - shift))
              .join('');
          };
          const local = decode(enc1);
          const domain = decode(enc2);
          // Open mailto
          window.location.href = `mailto:${local}@${domain}`;
        });
      });

      const ripples = [];
      const triggerWave = (clientX, clientY) => {
        const ripple = {
          x: clientX,
          y: clientY,
          start: performance.now(),
          duration: 3500,
          el: document.createElement('div'),
        };
        ripple.el.className = 'wave-overlay';
        ripple.el.style.setProperty('--x', clientX + 'px');
        ripple.el.style.setProperty('--y', clientY + 'px');
        // Set initial values for CSS custom properties
        ripple.el.style.setProperty('--s', '0px');
        ripple.el.style.setProperty('--o', '0');
        document.body.appendChild(ripple.el);
        ripples.push(ripple);

        if (ripples.length === 1) {
          requestAnimationFrame(animateRipples);
        }
      };

      const animateRipples = (time) => {
        if (ripples.length === 0) {
          if (!isTouchDevice && turb && disp) {
            turb.setAttribute('baseFrequency', '0');
            disp.setAttribute('scale', '0');
          }
          return;
        }

        let totalScale = 0;
        let totalFreq = 0;

        for (let i = ripples.length - 1; i >= 0; i--) {
          const r = ripples[i];
          const elapsed = time - r.start;
          const p = elapsed / r.duration;

          if (p < 1) {
            const easeOut = 1 - Math.pow(1 - p, 3);
            const fade = 1 - Math.pow(p, 2);
            // Custom wave intensity: quick rise to peak, then slow fade
            // Peak at 30% of duration, then quadratic fade
            const waveIntensity = p < 0.3 ? p / 0.3 : 1 - Math.pow((p - 0.3) / 0.7, 2);
            const freq = 0.005 + waveIntensity * 0.0015; // Reduced from 0.002 for less dramatic effect
            // Scale follows wave intensity with additional fade - reduced for less dramatic effect
            const scale = waveIntensity * 90 * fade; // Reduced from 120

            // Adjust radius and opacity for touch devices
            const maxRadius = isTouchDevice ? Math.min(2500, Math.max(window.innerWidth, window.innerHeight) * 0.8) : 2500;
            const opacityMultiplier = isTouchDevice ? 1.2 : 0.8;
            r.el.style.setProperty('--s', easeOut * maxRadius + 'px');
            r.el.style.setProperty('--o', fade * opacityMultiplier);

            totalScale += scale;
            totalFreq = Math.max(totalFreq, freq);
          } else {
            r.el.remove();
            ripples.splice(i, 1);
          }
        }

        if (!isTouchDevice && turb && disp) {
          turb.setAttribute('baseFrequency', totalFreq);
          disp.setAttribute('scale', Math.min(totalScale, 150)); // Reduced from 200 for less dramatic effect
        }

        requestAnimationFrame(animateRipples);
      };

      document.addEventListener('mousedown', (e) => {
        if (!e.target.closest('a')) {
          triggerWave(e.clientX, e.clientY);
        }
      });
      document.addEventListener('touchstart', (e) => {
        if (!e.target.closest('a')) {
          const touch = e.touches[0];
          triggerWave(touch.clientX, touch.clientY);
        }
      });

      // Automatic underwater plant sway animation (no device sensor)
      (function () {
        const card = document.getElementById('card');
        if (!card) return;

        // Animation frame ID
        let animationFrame = null;
        let startTime = null;

        // Sway parameters
        const SWAY_SPEED = 0.001;
        const SWAY_ROTATION_AMPLITUDE = 3.5; // degrees - slightly reduced for smoother motion
        const SWAY_TRANSLATION_AMPLITUDE = 1.5; // pixels - reduced translation jerkiness
        const SWAY_RANDOM_INTERVAL = 8000; // ms - ensure target changes less frequently

        let swayTime = 0;
        let lastRandomTime = 0;
        let targetSwayRotX = 0;
        let targetSwayRotY = 0;
        let targetSwayX = 0;
        let targetSwayY = 0;
        let currentSwayRotX = 0;
        let currentSwayRotY = 0;
        let currentSwayX = 0;
        let currentSwayY = 0;

        // Generate new random targets
        const generateRandomTargets = () => {
          targetSwayRotX = (Math.random() - 0.5) * 2 * SWAY_ROTATION_AMPLITUDE;
          targetSwayRotY = (Math.random() - 0.5) * 2 * SWAY_ROTATION_AMPLITUDE;
          targetSwayX = (Math.random() - 0.5) * 2 * SWAY_TRANSLATION_AMPLITUDE;
          targetSwayY = (Math.random() - 0.5) * 2 * SWAY_TRANSLATION_AMPLITUDE;
        };

        // Update sway values
        const updateSway = (time) => {
          if (!startTime) startTime = time;
          swayTime = (time - startTime) * SWAY_SPEED;

          // Generate new random targets periodically
          if (time - lastRandomTime > SWAY_RANDOM_INTERVAL) {
            lastRandomTime = time;
            generateRandomTargets();
          }

          // Smooth interpolation towards targets
          const swaySmoothing = 0.01;
          currentSwayX += (targetSwayX - currentSwayX) * swaySmoothing;
          currentSwayY += (targetSwayY - currentSwayY) * swaySmoothing;
          currentSwayRotX += (targetSwayRotX - currentSwayRotX) * swaySmoothing;
          currentSwayRotY += (targetSwayRotY - currentSwayRotY) * swaySmoothing;

          // Add subtle periodic movement using sine waves for organic feel
          const waveRotX = Math.sin(swayTime * 0.3) * 0.4;
          const waveRotY = Math.cos(swayTime * 0.9) * 0.4;
          const waveX = Math.sin(swayTime * 0.5) * 0.2;
          const waveY = Math.cos(swayTime * 0.7) * 0.2;

          return {
            x: currentSwayX + waveX,
            y: currentSwayY + waveY,
            rotX: currentSwayRotX + waveRotX,
            rotY: currentSwayRotY + waveRotY,
          };
        };

        // Apply transform to card with sway
        const applySway = (time) => {
          const sway = updateSway(time);

          // Apply transform with translation and rotation
          card.style.transform = `translate(${sway.x}px, ${sway.y}px) rotateX(${sway.rotX}deg) rotateY(${sway.rotY}deg)`;

          // Continue animation
          animationFrame = requestAnimationFrame(applySway);
        };

        // Start sway animation after card entrance
        setTimeout(() => {
          startTime = performance.now();
          lastRandomTime = startTime;
          generateRandomTargets();
          if (animationFrame) cancelAnimationFrame(animationFrame);
          animationFrame = requestAnimationFrame(applySway);
        }, 1000);

        // Cleanup on page hide
        window.addEventListener('visibilitychange', () => {
          if (document.hidden) {
            if (animationFrame) {
              cancelAnimationFrame(animationFrame);
              animationFrame = null;
            }
          } else {
            if (!animationFrame) {
              animationFrame = requestAnimationFrame(applySway);
            }
          }
        });
      })();
    </script>
