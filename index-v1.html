<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jan Völker — UX Designer</title>
    <style>
      /* Reset */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      .got-bag-link:hover {
        color: var(--accent) !important;
      }

      :root {
        --bg: #f9f9f8;
        --text: #1a1a1a;
        --muted: #6b7280;
        --accent: #4a6fa5;
        --border: #e5e5e3;
        --dark-border: #333; /* New variable for dark border */
        --light-border: #c4c4c2; /* New variable for lighter border */
      }

      html,
      body {
        height: 100%;
        overflow-x: hidden;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Georgia', serif;
        display: flex; /* Re-added for vertical centering */
        align-items: center; /* Re-added for vertical centering */
        justify-content: center; /* Re-added for horizontal centering of the whole content */
        min-height: 100vh;
        padding: 2rem;
        cursor: none;
        /* text-align: center; */ /* Removed as justify-content handles centering */
      }

      .card {
        display: flex;
        flex-direction: column;
        /* align-items: center; */ /* Removed as body handles centering */
        max-width: 480px;
        width: 100%;
        /* margin: 0 auto; */ /* Removed as body handles centering */
        min-height: 50vh; /* Changed to 50vh */
        position: relative;
        z-index: 20;
      }

      .name {
        font-size: 2rem;
        font-weight: normal;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }

      .role {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 0.875rem;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: 0.4rem;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--light-border); /* Using the new lighter border */
        margin: 2rem 0;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .links a {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 0.9rem;
        color: var(--text);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        transition: color 0.2s ease;
        cursor: none;
      }

      .links a:hover {
        color: var(--accent);
      }

      .links a .label {
        color: var(--muted);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        min-width: 4rem;
      }

      .footer {
        margin-top: 2.5rem;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 0.75rem;
        color: var(--muted);
      }

      .impressum {
        margin-top: 4rem; /* Adjusted margin */
        padding-top: 2rem;
        border-top: 1px solid var(--light-border); /* Using the new lighter border */
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 0.75rem;
        color: var(--muted);
        line-height: 1.6;
      }

      .impressum-toggle {
        background: none;
        border: none;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 0.75rem;
        font-weight: normal;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text);
        cursor: none;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: color 0.2s ease;
      }

      .impressum-toggle:hover {
        color: var(--accent);
      }

      .impressum-toggle::after {
        content: '↓';
        transition: transform 0.2s ease;
      }

      .impressum-toggle.open::after {
        transform: rotate(180deg);
      }

      .impressum-content {
        height: 0;
        overflow: hidden;
        transition: margin-top 0.3s ease;
        margin-top: 0;
      }

      .impressum-content.open {
        height: auto;
        margin-top: 0.75rem;
      }

      #shark {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        width: 36px;
        height: 72px;
        opacity: 0;
        transition: opacity 0.3s ease;
        will-change: transform;
      }

      #shark.active {
        opacity: 1;
      }

      #trail-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9997;
      }

      #ripple-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9995;
      }

      #fish-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
      }

      #light-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .water-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
        opacity: 0.6;
        background:
          radial-gradient(ellipse at 20% 50%, rgba(74, 111, 165, 0.6) 0%, transparent 55%), radial-gradient(ellipse at 80% 20%, rgba(74, 111, 165, 0.6) 0%, transparent 55%),
          radial-gradient(ellipse at 50% 80%, rgba(74, 111, 165, 0.6) 0%, transparent 55%);
        animation: water-shift 11s ease-in-out infinite alternate;
      }

      @keyframes water-shift {
        0% {
          opacity: 0.5;
          transform: scale(1) translate(0, 0);
        }
        50% {
          opacity: 0.7;
          transform: scale(1.17) translate(4%, -4%);
        }
        100% {
          opacity: 0.5;
          transform: scale(1) translate(0, 0);
        }
      }

      @media (max-width: 640px) {
        body {
          cursor: auto;
        }
        #shark,
        #trail-canvas {
          display: none;
        }
        .links a,
        .impressum-toggle {
          cursor: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="water-overlay"></div>
    <canvas id="light-canvas"></canvas>
    <canvas id="ripple-canvas"></canvas>
    <canvas id="trail-canvas"></canvas>
    <canvas id="fish-canvas"></canvas>

    <div id="shark">
      <svg viewBox="0 0 36 72" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%">
        <!-- Body -->
        <ellipse cx="18" cy="32" rx="6.5" ry="20" fill="#4a6fa5" opacity="0.5" />
        <!-- Snout -->
        <ellipse cx="18" cy="11" rx="3.5" ry="7" fill="#4a6fa5" opacity="0.55" />
        <!-- Left pectoral fin -->
        <path d="M12 28 Q3 35 5 40 Q9 37 13 33Z" fill="#4a6fa5" opacity="0.38" />
        <!-- Right pectoral fin -->
        <path d="M24 28 Q33 35 31 40 Q27 37 23 33Z" fill="#4a6fa5" opacity="0.38" />
        <!-- Dorsal ridge -->
        <ellipse cx="18" cy="28" rx="2" ry="7" fill="#3d5f8f" opacity="0.35" />
        <!-- Tail -->
        <path d="M18 50 Q13 57 9 66 Q16 59 18 55 Q20 59 27 66 Q23 57 18 50Z" fill="#4a6fa5" opacity="0.42" />
        <!-- Eyes -->
        <circle cx="14" cy="15" r="1.3" fill="#2a4a6f" opacity="0.75" />
        <circle cx="22" cy="15" r="1.3" fill="#2a4a6f" opacity="0.75" />
        <!-- Gill slits -->
        <line x1="13" y1="22" x2="13" y2="25" stroke="#3d5f8f" stroke-width="0.6" opacity="0.35" />
        <line x1="14.5" y1="21.5" x2="14.5" y2="25.5" stroke="#3d5f8f" stroke-width="0.6" opacity="0.35" />
        <line x1="21.5" y1="21.5" x2="21.5" y2="25.5" stroke="#3d5f8f" stroke-width="0.6" opacity="0.35" />
        <line x1="23" y1="22" x2="23" y2="25" stroke="#3d5f8f" stroke-width="0.6" opacity="0.35" />
      </svg>
    </div>

    <main class="card">
      <h1 class="name">Jan Völker</h1>
      <p class="role">UX Designer · <a href="https://got-bag.com/" target="_blank" style="text-decoration: none; color: inherit; cursor: none" class="got-bag-link">GOT BAG</a></p>

      <hr class="divider" />

      <nav class="links">
        <a href="#" id="email-link">
          <span class="label">Email</span>
          <span id="email-display"></span>
        </a>
        <a href="https://www.linkedin.com/in/jan-voelker/" target="_blank" rel="noopener">
          <span class="label">LinkedIn</span>
          Profil ansehen
        </a>
      </nav>

      <p class="footer">Mainz, DE</p>

      <div class="impressum">
        <button class="impressum-toggle" id="impressum-toggle">Impressum</button>
        <div class="impressum-content" id="impressum-content">
          <p>
            Jan Völker<br />
            c/o GOT BAG GmbH<br />
            Breidenbacherstraße 8-10<br />
            55116 Mainz
          </p>
        </div>
      </div>
    </main>

    <script>
      // ── Email obfuscation ──
      const user = 'hallo';
      const domain = 'janvoelker.de';
      const emailAddr = user + '@' + domain;
      document.getElementById('email-link').href = 'mailto:' + emailAddr;
      document.getElementById('email-display').textContent = emailAddr;

      // ── Impressum toggle ──
      const toggleBtn = document.getElementById('impressum-toggle');
      const impContent = document.getElementById('impressum-content');

      // Easing function for smoother animation
      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      // Generic animation function
      function animateHeight(startHeight, endHeight, duration, callback) {
        const startTime = performance.now();

        function animationFrame(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const easedProgress = easeOutCubic(progress);
          const currentHeight = startHeight + (endHeight - startHeight) * easedProgress;
          impContent.style.height = `${currentHeight}px`;

          if (progress < 1) {
            requestAnimationFrame(animationFrame);
          } else {
            if (callback) callback();
          }
        }

        requestAnimationFrame(animationFrame);
      }

      toggleBtn.addEventListener('click', () => {
        const isOpen = impContent.classList.contains('open');
        toggleBtn.classList.toggle('open');

        if (isOpen) {
          // Close animation
          const startHeight = impContent.offsetHeight;
          animateHeight(startHeight, 0, 300, () => {
            impContent.classList.remove('open');
          });
        } else {
          // Open animation
          impContent.classList.add('open');
          const contentHeight = impContent.scrollHeight;
          impContent.style.height = '0';
          animateHeight(0, contentHeight, 400, () => {
            impContent.style.height = 'auto';
          });
        }
      });

      // ── Shark cursor (rotates to face movement direction) ──
      const shark = document.getElementById('shark');
      const sharkH = 72;
      const noseOffset = sharkH * 0.45;

      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let sharkX = mouseX;
      let sharkY = mouseY;
      let sharkAngle = 0;
      let targetAngle = 0;
      let lastSX = sharkX;
      let lastSY = sharkY;
      let speed = 0;

      document.addEventListener('mousemove', (e) => {
        // Calculate movement direction
        const dx = e.clientX - mouseX;
        const dy = e.clientY - mouseY;
        targetAngle = Math.atan2(dy, dx);

        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function lerpAngle(a, b, t) {
        let d = b - a;
        while (d > Math.PI) d -= Math.PI * 2;
        while (d < -Math.PI) d += Math.PI * 2;
        return a + d * t;
      }

      // ── Little fish followers ──
      const numFish = 7;
      const fishSize = 8;
      const fishFollowDistance = 90;
      const fishLerp = 0.012;

      class LittleFish {
        constructor(index) {
          this.index = index;
          // Start at cursor position
          this.x = mouseX;
          this.y = mouseY;
          this.angle = Math.random() * Math.PI * 2;
          this.wobble = Math.random() * Math.PI * 2;
          this.wobbleSpeed = 0.04 + Math.random() * 0.04;
          this.color = `hsl(${180 + Math.random() * 40}, 70%, ${55 + Math.random() * 15}%)`;
          // Varying distance from shark
          this.distanceOffset = (Math.random() - 0.5) * 30;
          // Varying lag (different speeds)
          this.lagFactor = 0.008 + Math.random() * 0.012;
          // Path history for following shark's trail
          this.pathHistory = [];
          this.pathLength = 20 + Math.floor(index * 5);
          this.pathIndex = 0;
          // Fish trail
          this.trail = [];
          this.trailMax = 35;
        }

        update(sharkX, sharkY, sharkAngle, dt) {
          // Add current shark position to path history
          this.pathHistory.unshift({ x: sharkX, y: sharkY, angle: sharkAngle });
          if (this.pathHistory.length > this.pathLength) {
            this.pathHistory.pop();
          }

          // Find position on path based on distance
          const targetPathIndex = Math.min(this.pathLength - 1, Math.floor(this.pathIndex + fishFollowDistance / 5));
          const pathPos = this.pathHistory[Math.min(this.pathHistory.length - 1, targetPathIndex)];

          if (pathPos) {
            // Target position: behind shark along its path
            const baseBehindAngle = pathPos.angle + Math.PI;
            const spreadAngle = (this.index - numFish / 2) * 0.25;
            const totalAngle = baseBehindAngle + spreadAngle;
            const actualDistance = fishFollowDistance + this.distanceOffset;

            let targetX = pathPos.x + Math.cos(totalAngle) * actualDistance;
            let targetY = pathPos.y + Math.sin(totalAngle) * actualDistance;

            // Add some wobble
            this.wobble += this.wobbleSpeed;
            const wobbleX = Math.sin(this.wobble) * 15;
            const wobbleY = Math.cos(this.wobble * 0.7) * 10;

            // Lerp towards target with individual lag
            this.x += (targetX + wobbleX - this.x) * this.lagFactor;
            this.y += (targetY + wobbleY - this.y) * this.lagFactor;

            // Angle: align with shark's direction (follow direction)
            this.angle = lerpAngle(this.angle, pathPos.angle, 0.015);
          }

          // Increment path index to follow the trail
          this.pathIndex += 0.5;
          if (this.pathIndex > this.pathLength) {
            this.pathIndex = 0;
          }

          // Add current position to trail
          this.trail.unshift({ x: this.x, y: this.y, alpha: 1 });
          if (this.trail.length > this.trailMax) {
            this.trail.pop();
          }
          // Fade trail over time
          for (let i = 0; i < this.trail.length; i++) {
            this.trail[i].alpha = 1 - i / this.trailMax;
          }
        }

        draw(ctx) {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.angle + Math.PI / 16);

          // Fish body
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.ellipse(0, 0, fishSize, fishSize * 0.6, 0, 0, Math.PI * 2);
          ctx.fill();

          // Tail
          ctx.beginPath();
          ctx.moveTo(-fishSize * 0.5, 0);
          ctx.lineTo(-fishSize * 1.2, -fishSize * 0.8);
          ctx.lineTo(-fishSize * 1.2, fishSize * 0.8);
          ctx.closePath();
          ctx.fill();

          // Eye
          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.beginPath();
          ctx.arc(fishSize * 0.2, -fishSize * 0.2, fishSize * 0.15, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath();
          ctx.arc(fishSize * 0.25, -fishSize * 0.2, fishSize * 0.06, 0, Math.PI * 2);
          ctx.fill();

          ctx.restore();

          // Draw fish trail
          if (this.trail.length > 1) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for (let i = 1; i < this.trail.length; i++) {
              const midX = (this.trail[i - 1].x + this.trail[i].x) / 2;
              const midY = (this.trail[i - 1].y + this.trail[i].y) / 2;
              ctx.quadraticCurveTo(this.trail[i - 1].x, this.trail[i - 1].y, midX, midY);
            }
            const grad = ctx.createLinearGradient(this.trail[0].x, this.trail[0].y, this.trail[this.trail.length - 1].x, this.trail[this.trail.length - 1].y);
            grad.addColorStop(0, this.color.replace(')', `, ${this.trail[0].alpha * 0.3})`));
            grad.addColorStop(1, this.color.replace(')', `, 0)`));
            ctx.strokeStyle = grad;
            ctx.lineWidth = fishSize * 0.3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            ctx.restore();
          }
        }
      }

      const littleFish = [];
      for (let i = 0; i < numFish; i++) {
        littleFish.push(new LittleFish(i));
      }

      // ── Trail (3 wake lines) ──
      const trailCanvas = document.getElementById('trail-canvas');
      const trailCtx = trailCanvas.getContext('2d');
      const rippleCanvas = document.getElementById('ripple-canvas');
      const rippleCtx = rippleCanvas.getContext('2d');

      // ── Light canvas (subtle water reflections) ──
      const lightCanvas = document.getElementById('light-canvas');
      const lightCtx = lightCanvas.getContext('2d');

      // ── Fish canvas ──
      const fishCanvas = document.getElementById('fish-canvas');
      const fishCtx = fishCanvas.getContext('2d');

      // Cache frequently used Math operations
      const PI = Math.PI;
      const PI_2 = PI * 2;
      const PI_HALF = PI / 2;
      const PI_QUARTER = PI / 4;

      // ── Subtle water light reflections ──
      const numLightRays = 6;
      const lightRays = [];
      for (let i = 0; i < numLightRays; i++) {
        lightRays.push({
          angle: (PI_2 * i) / numLightRays,
          speed: 0.0005 + Math.random() * 0.001,
          amplitude: 0.3 + Math.random() * 0.4,
          phase: Math.random() * PI_2,
          width: 80 + Math.random() * 120,
        });
      }

      // ── 3D Water Ripples ──
      let ripples = [];

      class Ripple {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.time = 0;
          this.maxTime = 4.5 + Math.random() * 1.5;
          this.maxRadius = Math.max(rippleCanvas.width, rippleCanvas.height) * 0.55;
          this.waveCount = 5 + Math.floor(Math.random() * 3);
          this.speed = 95 + Math.random() * 15;
          // Store irregularities for each wave
          this.waveIrregularities = [];
          for (let i = 0; i < this.waveCount; i++) {
            this.waveIrregularities.push({
              amplitude: 0.5 + Math.random() * 2,
              frequency: 0.5 + Math.random() * 1.5,
              phase: Math.random() * PI_2,
            });
          }
        }

        update(dt) {
          this.time += dt;
          return this.time < this.maxTime;
        }

        draw(ctx) {
          const progress = this.time / this.maxTime;
          const globalFade = 1 - Math.pow(progress, 0.7);

          for (let w = 0; w < this.waveCount; w++) {
            const waveDelay = w * 0.3;
            const waveTime = this.time - waveDelay;
            if (waveTime < 0) continue;

            const radius = waveTime * this.speed;
            if (radius > this.maxRadius || radius < 1) continue;

            const waveFade = 1 - w / this.waveCount;
            const timeFade = Math.max(0, 1 - waveTime / (this.maxTime - waveDelay));
            const alpha = waveFade * timeFade * globalFade * 0.3;
            if (alpha <= 0.001) continue;

            const thickness = Math.max(0.8, 2.5 - w * 0.25);

            // Calculate irregular radius first
            const waveIrregularity = this.waveIrregularities[w];
            const irregularRadius = Math.max(1, radius + Math.sin(waveTime * waveIrregularity.frequency + waveIrregularity.phase) * waveIrregularity.amplitude);

            // Main ring (circular but with irregular thickness)
            ctx.beginPath();
            ctx.arc(this.x, this.y, irregularRadius, 0, PI_2);
            ctx.strokeStyle = `rgba(74, 111, 165, ${alpha})`;
            ctx.lineWidth = thickness;
            ctx.stroke();

            // Shadow ring (inner, gives 3D depth, with irregularity)
            if (irregularRadius > 5) {
              ctx.beginPath();
              const shadowIrregularity = radius - 2.5 + Math.sin(waveTime * waveIrregularity.frequency + waveIrregularity.phase + PI) * waveIrregularity.amplitude * 0.8;
              ctx.arc(this.x, this.y, Math.max(1, shadowIrregularity), 0, PI_2);
              ctx.strokeStyle = `rgba(74, 111, 165, ${alpha * 0.25})`;
              ctx.lineWidth = thickness * 2.8;
              ctx.stroke();
            }

            // Highlight arc (top edge, 3D sheen, slightly broken)
            if (irregularRadius > 8) {
              ctx.beginPath();
              const startAngle = -PI_QUARTER + (Math.random() - 0.5) * 0.2;
              const endAngle = PI_QUARTER + (Math.random() - 0.5) * 0.2;
              ctx.arc(this.x, this.y, irregularRadius + 1.5, startAngle, endAngle);
              ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.45})`;
              ctx.lineWidth = thickness * 0.7;
              ctx.stroke();
            }
          }
        }
      }

      function resize() {
        trailCanvas.width = window.innerWidth;
        trailCanvas.height = window.innerHeight;
        rippleCanvas.width = window.innerWidth;
        rippleCanvas.height = window.innerHeight;
        fishCanvas.width = window.innerWidth;
        fishCanvas.height = window.innerHeight;
        lightCanvas.width = window.innerWidth;
        lightCanvas.height = window.innerHeight;
      }
      resize();

      // Debounce resize events
      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(resize, 100);
      });

      const trailMaxPts = 200;
      const trailLines = [
        { offset: 0, width: 2.5, alpha: 0.18, points: [] },
        { offset: -7, width: 1.4, alpha: 0.1, points: [] },
        { offset: 7, width: 1.4, alpha: 0.1, points: [] },
      ];

      // ── Main animation loop ──
      let lastTime = 0;
      function animate(now) {
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        // Shark movement
        const dx = mouseX - sharkX;
        const dy = mouseY - sharkY;

        if (Math.abs(dx) > 0.3 || Math.abs(dy) > 0.3) {
          targetAngle = Math.atan2(dy, dx);
        }

        sharkAngle = lerpAngle(sharkAngle, targetAngle, 0.12);

        // Position: offset so nose tip is at cursor
        const centerTargetX = mouseX - Math.cos(sharkAngle) * noseOffset;
        const centerTargetY = mouseY - Math.sin(sharkAngle) * noseOffset;

        sharkX += (centerTargetX - sharkX) * 0.15;
        sharkY += (centerTargetY - sharkY) * 0.15;

        // Speed tracking
        const moved = Math.hypot(sharkX - lastSX, sharkY - lastSY);
        speed = speed * 0.92 + moved * 0.08;
        lastSX = sharkX;
        lastSY = sharkY;

        // Apply to DOM
        shark.classList.add('active');
        shark.style.left = sharkX + 'px';
        shark.style.top = sharkY + 'px';
        shark.style.transform = `translate(-50%, -50%) rotate(${sharkAngle * (180 / Math.PI) + 90}deg)`;
        shark.style.opacity = '1';

        // ── Update and draw little fish ──
        fishCtx.clearRect(0, 0, fishCanvas.width, fishCanvas.height);
        for (const fish of littleFish) {
          fish.update(sharkX, sharkY, sharkAngle, dt);
          fish.draw(fishCtx);
        }

        // ── Trail points ──
        const tailX = sharkX - Math.cos(sharkAngle) * noseOffset * 0.9;
        const tailY = sharkY - Math.sin(sharkAngle) * noseOffset * 0.9;
        const perpX = -Math.sin(sharkAngle);
        const perpY = Math.cos(sharkAngle);

        for (const trail of trailLines) {
          const px = tailX + perpX * trail.offset;
          const py = tailY + perpY * trail.offset;
          trail.points.unshift({ x: px, y: py });
          if (trail.points.length > trailMaxPts) trail.points.pop();
        }

        // ── Draw trails ──
        trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);

        for (const trail of trailLines) {
          const pts = trail.points;
          if (pts.length < 3) continue;

          const intensity = Math.min(1, speed * 0.6);
          if (intensity < 0.01) continue;

          trailCtx.beginPath();
          trailCtx.moveTo(pts[0].x, pts[0].y);

          for (let j = 1; j < pts.length - 1; j++) {
            const mx = (pts[j].x + pts[j + 1].x) / 2;
            const my = (pts[j].y + pts[j + 1].y) / 2;
            trailCtx.quadraticCurveTo(pts[j].x, pts[j].y, mx, my);
          }

          const last = pts[pts.length - 1];
          trailCtx.lineTo(last.x, last.y);

          const grad = trailCtx.createLinearGradient(pts[0].x, pts[0].y, last.x, last.y);
          const a = trail.alpha * intensity;
          grad.addColorStop(0, `rgba(74, 111, 165, ${a})`);
          grad.addColorStop(0.5, `rgba(74, 111, 165, ${a * 0.4})`);
          grad.addColorStop(1, `rgba(74, 111, 165, 0)`);

          trailCtx.strokeStyle = grad;
          trailCtx.lineWidth = trail.width;
          trailCtx.lineCap = 'round';
          trailCtx.lineJoin = 'round';
          trailCtx.stroke();
        }

        // ── Subtle water light reflections ──
        lightCtx.clearRect(0, 0, lightCanvas.width, lightCanvas.height);
        const time = now * 0.001;

        for (const ray of lightRays) {
          const waveOffset = Math.sin(time * ray.speed + ray.phase) * ray.amplitude;
          const rayAngle = ray.angle + waveOffset;

          const centerX = lightCanvas.width / 2;
          const centerY = lightCanvas.height / 2;
          const canvasSize = Math.min(lightCanvas.width, lightCanvas.height);

          // Ensure canvasSize is valid
          if (isNaN(canvasSize) || canvasSize <= 0) continue;

          const endX = centerX + Math.cos(rayAngle) * canvasSize * 0.7;
          const endY = centerY + Math.sin(rayAngle) * canvasSize * 0.7;

          // Ensure endX and endY are valid
          if (isNaN(endX) || isNaN(endY)) continue;

          const grad = lightCtx.createLinearGradient(centerX, centerY, endX, endY);
          grad.addColorStop(0, 'rgba(255, 255, 255, 0.6)');
          grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.3)');
          grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

          lightCtx.beginPath();
          lightCtx.moveTo(centerX, centerY);
          lightCtx.lineTo(endX, endY);
          lightCtx.strokeStyle = grad;
          lightCtx.lineWidth = ray.width * 1.7;
          lightCtx.stroke();
        }

        // ── 3D Water Ripples ──
        rippleCtx.clearRect(0, 0, rippleCanvas.width, rippleCanvas.height);
        ripples = ripples.filter((r) => r.update(dt));
        ripples.forEach((r) => r.draw(rippleCtx));

        requestAnimationFrame(animate);
      }

      animate();

      function createRipple(x, y) {
        ripples.push(new Ripple(x, y));
      }

      document.addEventListener('click', (e) => {
        createRipple(e.clientX, e.clientY);
      });

      document.addEventListener('touchstart', (e) => {
        for (const touch of e.changedTouches) {
          createRipple(touch.clientX, touch.clientY);
        }
      });

      function createRipple(x, y) {
        ripples.push(new Ripple(x, y));

      document.addEventListener('click', (e) => {
        createRipple(e.clientX, e.clientY);
      });

      document.addEventListener('touchstart', (e) => {
        for (const touch of e.changedTouches) {
          createRipple(touch.clientX, touch.clientY);
        }
      });
    </script>
